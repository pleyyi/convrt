<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>convrt</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800;900&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 300px; background: #111; font-family: 'JetBrains Mono', monospace; color: #bbb; overflow: hidden; }

.header { display: flex; align-items: center; justify-content: space-between; padding: 11px 14px 10px; border-bottom: 1px solid #1d1d1d; background: #0d0d0d; }
.logo-wrap { display: flex; flex-direction: column; gap: 1px; }
.logo { font-size: 13px; font-weight: 900; color: #e2b714; letter-spacing: 3px; text-transform: uppercase; line-height: 1; }
.logo-sub { font-size: 7px; font-weight: 600; color: #333; letter-spacing: 2px; text-transform: uppercase; }
.header-right { display: flex; align-items: center; gap: 9px; }

.statusDot { width: 6px; height: 6px; border-radius: 50%; background: #2a2a2a; flex-shrink: 0; transition: all 0.3s; }
.statusDot.live { background: #e2b714; box-shadow: 0 0 6px #e2b71466; }

.rfbtn { font-size: 12px; color: #555; background: none; border: none; cursor: pointer; font-family: inherit; outline: none; padding: 1px 3px; line-height: 1; transition: color 0.1s; }
.rfbtn:hover { color: #aaa; }

.toggle-row { display: flex; align-items: center; gap: 6px; }
.toggle-label { font-size: 8px; font-weight: 700; color: #555; letter-spacing: 1.5px; text-transform: uppercase; }
.toggle-btn { position: relative; width: 28px; height: 16px; background: #1e1e1e; border-radius: 8px; border: 1px solid #2a2a2a; cursor: pointer; outline: none; transition: background 0.2s, border-color 0.2s; flex-shrink: 0; padding: 0; }
.toggle-btn.on { background: #2a2200; border-color: #e2b71455; }
.toggle-knob { position: absolute; top: 50%; left: 3px; transform: translateY(-50%); width: 10px; height: 10px; border-radius: 50%; background: #404040; transition: left 0.2s, background 0.2s; pointer-events: none; }
.toggle-btn.on .toggle-knob { left: 15px; background: #e2b714; }

.methods { display: flex; border-bottom: 1px solid #1d1d1d; background: #0d0d0d; }
.mbtn { flex: 1; padding: 9px 4px; border: none; border-bottom: 2px solid transparent; background: transparent; color: #444; font-family: inherit; font-size: 8px; font-weight: 800; cursor: pointer; letter-spacing: 1.2px; text-transform: uppercase; outline: none; transition: color 0.1s, border-color 0.1s; }
.mbtn:hover { color: #777; }
.mbtn.active { color: #e2b714; border-bottom-color: #e2b714; }

.ping-block { padding: 10px 14px 11px; border-bottom: 1px solid #1d1d1d; transition: opacity 0.15s; }
.ping-block.locked { opacity: 0.15; pointer-events: none; }
.ping-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 9px; }
.ping-left { display: flex; align-items: center; gap: 7px; }
.ping-label { font-size: 8px; font-weight: 700; letter-spacing: 2px; color: #555; text-transform: uppercase; }
.ping-num { font-size: 11px; font-weight: 800; color: #e2b714; }
.reset-ping-btn { font-size: 7px; font-weight: 700; color: #333; background: none; border: 1px solid #222; padding: 2px 5px; cursor: pointer; font-family: inherit; letter-spacing: 0.5px; outline: none; transition: color 0.1s, border-color 0.1s; text-transform: uppercase; }
.reset-ping-btn:hover { color: #666; border-color: #444; }

input[type=range] { -webkit-appearance: none; appearance: none; width: 100%; height: 2px; background: #222; border-radius: 2px; outline: none; cursor: pointer; display: block; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 13px; height: 13px; border-radius: 50%; background: #e2b714; cursor: pointer; box-shadow: 0 0 5px #e2b71433; }
input[type=range]::-webkit-slider-thumb:hover { box-shadow: 0 0 10px #e2b71466; }
.ticks { display: flex; justify-content: space-between; margin-top: 5px; }
.tick { font-size: 7px; color: #2a2a2a; font-weight: 600; }

.wpm-display { padding: 14px 14px 12px; border-bottom: 1px solid #1d1d1d; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.wpm-side { display: flex; flex-direction: column; gap: 3px; flex: 1; }
.wpm-side.right { align-items: flex-end; }
.wpm-tag { font-size: 7px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #4a4a4a; }
.wpm-val { font-size: 28px; font-weight: 900; letter-spacing: -2px; line-height: 1; color: #777; }
.wpm-val.lit { color: #e2b714; }
.wpm-label { font-size: 8px; color: #3a3a3a; letter-spacing: 1px; font-weight: 600; }
.wpm-mid { display: flex; flex-direction: column; align-items: center; gap: 5px; flex-shrink: 0; }
.wpm-arrow { font-size: 11px; color: #333; font-weight: 900; }
.chip { font-size: 7px; color: #444; border: 1px solid #1e1e1e; padding: 2px 5px; letter-spacing: 0.5px; white-space: nowrap; background: #0d0d0d; }

.hist-block { padding: 9px 14px 12px; }
.hist-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.hist-tag { font-size: 7px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #3a3a3a; }
.clear-btn { display: none; font-size: 7px; font-weight: 700; color: #333; background: none; border: 1px solid #1e1e1e; padding: 2px 6px; cursor: pointer; font-family: inherit; letter-spacing: 0.5px; text-transform: uppercase; outline: none; transition: color 0.1s, border-color 0.1s; }
.clear-btn:hover { color: #e05555; border-color: #e0555544; }

.hist-scroll { max-height: 150px; overflow-y: auto; display: flex; flex-direction: column; gap: 3px; }
.hist-scroll::-webkit-scrollbar { width: 3px; }
.hist-scroll::-webkit-scrollbar-track { background: #111; }
.hist-scroll::-webkit-scrollbar-thumb { background: #2a2a2a; }
.hist-scroll::-webkit-scrollbar-thumb:hover { background: #3a3a3a; }

.hist-row { display: flex; align-items: center; justify-content: space-between; padding: 5px 9px; background: #0d0d0d; border: 1px solid #1d1d1d; gap: 6px; }
.hr-word { flex: 1; font-size: 9px; color: #555; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hr-nums { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.hr-raw { font-size: 9px; color: #4a4a4a; font-weight: 700; }
.hr-arr { font-size: 8px; color: #2e2e2e; }
.hr-conv { font-size: 9px; color: #e2b714; font-weight: 800; }
.empty { font-size: 9px; color: #2e2e2e; text-align: center; padding: 12px 0; letter-spacing: 1px; }
</style>
</head>
<body>

<div class="header">
  <div class="logo-wrap">
    <div class="logo">convrt</div>
    <div class="logo-sub">v1.0</div>
  </div>
  <div class="header-right">
    <div class="toggle-row">
      <span class="toggle-label">apply</span>
      <button class="toggle-btn on" id="toggleBtn"><div class="toggle-knob"></div></button>
    </div>
    <button class="rfbtn" id="rfBtn">↻</button>
    <div class="statusDot" id="statusDot"></div>
  </div>
</div>

<div class="methods">
  <button class="mbtn active" id="mWithPing">with ping</button>
  <button class="mbtn" id="mZeroPing">0 ping</button>
  <button class="mbtn" id="mX135">×1.35 raw</button>
</div>

<div class="ping-block locked" id="pingBlock">
  <div class="ping-top">
    <div class="ping-left">
      <div class="ping-label">Ping</div>
      <div class="ping-num" id="pingNum">+20ms</div>
      <button class="reset-ping-btn" id="resetPingBtn">reset</button>
    </div>
  </div>
  <input type="range" id="pingSlider" min="0" max="200" step="1" value="20">
  <div class="ticks">
    <span class="tick">0</span><span class="tick">50</span><span class="tick">100</span><span class="tick">150</span><span class="tick">200ms</span>
  </div>
</div>

<div class="wpm-display">
  <div class="wpm-side">
    <div class="wpm-tag">Raw</div>
    <div class="wpm-val" id="rawNum">—</div>
    <div class="wpm-label">wpm</div>
  </div>
  <div class="wpm-mid">
    <div class="wpm-arrow">→</div>
    <div class="chip" id="chip">—</div>
  </div>
  <div class="wpm-side right">
    <div class="wpm-tag">Converted</div>
    <div class="wpm-val lit" id="convNum">—</div>
    <div class="wpm-label">wpm</div>
  </div>
</div>

<div class="hist-block">
  <div class="hist-header">
    <div class="hist-tag">History</div>
    <button class="clear-btn" id="clearHistBtn">clear</button>
  </div>
  <div class="hist-scroll" id="histScroll">
    <div class="empty">no tests yet</div>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
